[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Redirect /api/generate → Netlify Function
[[redirects]]
  from = "/api/generate"
  to = "/.netlify/functions/generate"
  status = 200

# SPA fallback — all unmatched routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
